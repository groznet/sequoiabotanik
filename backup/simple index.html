<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequoya Base Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans text-gray-800">
    <div class="flex flex-col h-screen overflow-hidden max-w-[1366px] mx-auto w-full bg-white shadow-sm border-x border-gray-200">
        <!-- Header Container (Top, Full Width) -->
        <div id="header-container" class="z-20 relative w-full"></div>

        <!-- Middle Area (Sidebar + Content) -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar Container -->
            <div id="sidebar-container" class="z-30 relative flex-shrink-0"></div>

            <!-- Page Content -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 md:p-6">
                <h1 class="text-2xl font-semibold mb-4 text-gray-900">Dashboard</h1>
                <div class="bg-white shadow rounded-lg p-6">
                    <p class="text-gray-600 mb-4">
                        Welcome to the main content area. This layout demonstrates a minimal, modular approach.
                    </p>
                    <p class="text-gray-600">
                        The sidebar, header, and footer components are loaded dynamically from separate HTML files via
                        vanilla JavaScript.
                    </p>
                </div>
            </main>
        </div>

        <!-- Footer Container (Bottom, Full Width) -->
        <div id="footer-container" class="w-full"></div>
    </div>

    <!-- Application Script -->
    <script src="js/main.js"></script>
</body>

</html>
